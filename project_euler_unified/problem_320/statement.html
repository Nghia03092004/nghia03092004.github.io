<p class="noindent">Let \(N(i)\) be the smallest integer \(n\) such that \(n!\) is divisible by \((i!)^{1234567890}\)
</p><p class="noindent">Let \(S(u)=\sum N(i)\) for \(10 \le i \le u\).
</p><p class="noindent">\(S(1000)=614538266565663\).
</p><p class="noindent">Find \(S(1\,000\,000) \bmod 10^{18}\). </p>
