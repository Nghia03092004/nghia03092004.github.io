<p class="noindent">If we calculate $a^2 \mod 6$ for $0 \leq a \leq 5$ we get: $0, 1, 4, 3, 4, 1$.</p><div class="statement-spacer statement-spacer--baseline"></div><p class="noindent">The largest value of $a$ such that $a^2 \equiv a \pmod{6}$ is $4$.</p><p class="noindent">Let's call $M(n)$ the largest value of $a &lt; n$ such that $a^2 \equiv a \pmod{n}$.</p><p class="noindent">So $M(6) = 4$.</p><div class="statement-spacer statement-spacer--baseline"></div><p class="noindent">Find $\sum M(n)$ for $1 \leq n \leq 10^7$.</p>
