<p class="noindent">A positive integer is called <tspan font-family="\ec-lmri" font-size="\12">square root smooth </tspan>if all of its prime factors are strictly less than its square root.
</p><p class="noindent">Including the number \(1\), there are \(29\) square root smooth numbers not exceeding \(100\).
</p><p class="noindent">How many square root smooth numbers are there not exceeding \(10\,000\,000\,000\)? </p>
