<p class="noindent">Let \(\varphi (n)\) be Euler’s totient function.
</p><p class="noindent">Let \(f(n)=(\displaystyle {\sum }_{i=1}^{n}\varphi (n^i)) \bmod (n+1)\).
</p><p class="noindent">Let \(g(n)=\displaystyle {\sum }_{i=1}^{n} f(i)\).
</p><p class="noindent">You are given that \(g(100)=2007\).
</p><p class="noindent">Find \(g(5 \times 10^8)\). </p>
