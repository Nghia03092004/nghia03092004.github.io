<p class="noindent">Having three black objects B and one white object W they can be grouped in 7 ways like this:
                                                                      \[(BBBW) \quad (B,BBW) \quad (B,B,BW) \quad (B,B,B,W) \quad (B,BB,W) \quad (BBB,W) \quad (BB,BW)\]
 In how many ways can sixty black objects B and forty white objects W be thus grouped? </p>
