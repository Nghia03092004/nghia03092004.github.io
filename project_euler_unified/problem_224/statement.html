<p class="noindent">Let us call an integer sided triangle with sides \(a \le b \le c\) <tspan font-family="\ec-lmri" font-size="\12">barely obtuse </tspan>if the sides satisfy
</p><p class="noindent">\(a^2 + b^2 = c^2 - 1\).
</p><p class="noindent">How many barely obtuse triangles are there with perimeter \(\le 75\,000\,000\)? </p>
