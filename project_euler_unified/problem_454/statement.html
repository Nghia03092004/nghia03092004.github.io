<p class="noindent">In the following equation $x$, $y$, and $n$ are positive integers. $$\dfrac{1}{x} + \dfrac{1}{y} = \dfrac{1}{n}$$ For a limit $L$ we define $F(L)$ as the number of solutions which satisfy $x &lt; y \le L$.</p><div class="statement-spacer statement-spacer--baseline"></div><p class="noindent">We can verify that $F(15) = 4$ and $F(1000) = 1069$.</p><p class="noindent">Find $F(10^{12})$.</p>
