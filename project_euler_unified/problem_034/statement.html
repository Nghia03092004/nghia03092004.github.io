<p class="noindent">\(145\) is a curious number, as \(1! + 4! + 5! = 1 + 24 + 120 = 145\).
</p><p class="noindent">Find the sum of all numbers which are equal to the sum of the factorial of their digits.
</p><p class="noindent"><tspan font-family="\ec-lmbx" font-size="\10">Note:</tspan><tspan font-family="\ec-lmr" font-size="\10">As</tspan> \(1! = 1\) <tspan font-family="\ec-lmr" font-size="\10">and</tspan> \(2! = 2\) <tspan font-family="\ec-lmr" font-size="\10">are not sums they are not included.</tspan> </p>
