<p class="noindent">\(ABC\) is an integral sided triangle with sides \(a \le b \le c\).
</p><p class="noindent">\(m_C\) is the median connecting \(C\) and the midpoint of \(AB\).
</p><p class="noindent">\(F(n)\) is the number of such triangles with \(c \le n\) for which \(m_C\) has integral length as well.
</p><p class="noindent">\(F(10)=3\) and \(F(50)=165\).
</p><p class="noindent">Find \(F(100000)\). </p>
