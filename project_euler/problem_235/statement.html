<p class="noindent">Given is the arithmetic-geometric sequence \(u(k) = (900-3k)r^{k - 1}\).
</p><p class="noindent">Let \(s(n) = \sum _{k = 1}^n u(k)\).
</p><p class="noindent">Find the value of \(r\) for which \(s(5000) = -600\,000\,000\,000\).
</p><p class="noindent">Give your answer rounded to \(12\) places behind the decimal point. </p>
