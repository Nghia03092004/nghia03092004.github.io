<p class="noindent">We call a positive integer <tspan font-family="\ec-lmri" font-size="\12">double pandigital </tspan>if it uses all the digits \(0\) to \(9\) exactly twice (with no leading zero).
For example, \(40561817703823564929\) is one such number.
</p><p class="noindent">How many double pandigital numbers are divisible by \(11\)? </p>
