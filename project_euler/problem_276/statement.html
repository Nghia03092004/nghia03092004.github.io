<p class="noindent">Consider the triangles with integer sides \(a\), \(b\) and \(c\) with \(a \le b \le c\).
</p><p class="noindent">An integer sided triangle \((a,b,c)\) is called primitive if \(\underline {\gcd (a, b, c)} = 1\)
</p><p class="noindent">How many primitive integer sided triangles exist with a perimeter not exceeding \(10\,000\,000\)? </p>
