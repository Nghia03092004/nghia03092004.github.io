<p class="noindent">Let \(T(m, n)\) be the number of the binomial coefficients \(^iC_n\) that are divisible by \(10\) for \(n \le i &lt; m\) (\(i\), \(m\) and \(n\) are positive integers).
</p><p class="noindent">You are given that \(T(10^9, 10^7-10) = 989697000\).
</p><p class="noindent">Find \(T(10^{18}, 10^{12}-10)\). </p>
