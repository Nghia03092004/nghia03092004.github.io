<p class="noindent">Let \(a_n\) be the largest real root of a polynomial \(g(x) = x^3 - 2^n \cdot x^2 + n\).
</p><p class="noindent">For example, \(a_2 = 3.86619826\cdots \)
</p><p class="noindent">Find the last eight digits of \(\sum \limits _{i = 1}^{30} \lfloor a_i^{987654321} \rfloor \).
</p><p class="noindent"><tspan font-family="\ec-lmbx" font-size="\10">Note:</tspan> \(\lfloor a \rfloor \) <tspan font-family="\ec-lmr" font-size="\10">represents the floor function.</tspan> </p>
