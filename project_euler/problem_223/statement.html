<p class="noindent">Let us call an integer sided triangle with sides \(a \le b \le c\) <tspan font-family="\ec-lmri" font-size="\12">barely acute </tspan>if the sides satisfy \(a^2 + b^2 = c^2 + 1\).
</p><p class="noindent">How many barely acute triangles are there with perimeter \(\le 25\,000\,000\)? </p>
