<p class="noindent">For any \(N\), let \(f(N)\) be the last five digits before the trailing zeroes in \(N!\).
</p><p class="noindent">For example,
</p>
       <ul class="itemize1">
       <li class="itemize">
       <p class="noindent">\(9! = 362880\) so \(f(9)=36288\)
       </p></li>
       <li class="itemize">
       <p class="noindent">\(10! = 3628800\) so \(f(10)=36288\)
       </p></li>
       <li class="itemize">
       <p class="noindent">\(20! = 2432902008176640000\) so \(f(20)=17664\)</p></li></ul>
<p class="noindent">Find \(f(1\,000\,000\,000\,000)\). </p>
