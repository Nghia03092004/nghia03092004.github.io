name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Compute Astro site settings
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          REPO_NAME_LOWER="${REPO_NAME,,}"
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"

          if [ "$REPO_NAME_LOWER" = "$OWNER.github.io" ]; then
            echo "SITE_URL=https://$OWNER.github.io" >> "$GITHUB_ENV"
            echo "BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "SITE_URL=https://$OWNER.github.io" >> "$GITHUB_ENV"
            echo "BASE_PATH=/$REPO_NAME" >> "$GITHUB_ENV"
          fi

      - name: Install, build, and upload site
        uses: withastro/action@v5
        env:
          SITE_URL: ${{ env.SITE_URL }}
          BASE_PATH: ${{ env.BASE_PATH }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
