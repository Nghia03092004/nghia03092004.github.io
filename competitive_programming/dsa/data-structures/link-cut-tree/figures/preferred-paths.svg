<svg xmlns="http://www.w3.org/2000/svg" width="900" height="330" viewBox="0 0 900 330">
  <style>
    .t{font:600 20px 'IBM Plex Mono', monospace; fill:#161412}
    .s{font:16px 'IBM Plex Mono', monospace; fill:#5e5348}
    .n{fill:#fff8f1; stroke:#161412; stroke-width:2}
    .e{stroke:#161412; stroke-width:2.5; fill:none}
    .p{stroke:#c25f35; stroke-width:6; fill:none; stroke-linecap:round}
  </style>
  <text class="t" x="80" y="36">represented tree</text>
  <text class="t" x="535" y="36">preferred path exposed as one splay</text>

  <line class="e" x1="150" y1="80" x2="110" y2="140"/>
  <line class="e" x1="150" y1="80" x2="190" y2="140"/>
  <line class="e" x1="110" y1="140" x2="90" y2="210"/>
  <line class="e" x1="110" y1="140" x2="130" y2="210"/>
  <line class="e" x1="190" y1="140" x2="170" y2="210"/>
  <line class="e" x1="190" y1="140" x2="220" y2="210"/>
  <polyline class="p" points="150,80 110,140 130,210"/>
  <circle class="n" cx="150" cy="80" r="18"/><text class="t" x="144" y="87">r</text>
  <circle class="n" cx="110" cy="140" r="18"/><text class="t" x="104" y="147">a</text>
  <circle class="n" cx="190" cy="140" r="18"/><text class="t" x="184" y="147">b</text>
  <circle class="n" cx="90" cy="210" r="18"/><text class="t" x="84" y="217">c</text>
  <circle class="n" cx="130" cy="210" r="18"/><text class="t" x="124" y="217">x</text>
  <circle class="n" cx="170" cy="210" r="18"/><text class="t" x="164" y="217">d</text>
  <circle class="n" cx="220" cy="210" r="18"/><text class="t" x="214" y="217">e</text>
  <text class="s" x="70" y="270">highlighted edges form the current preferred path</text>

  <line class="e" x1="630" y1="90" x2="570" y2="160"/>
  <line class="e" x1="630" y1="90" x2="690" y2="160"/>
  <circle class="n" cx="630" cy="90" r="18"/><text class="t" x="624" y="97">a</text>
  <circle class="n" cx="570" cy="160" r="18"/><text class="t" x="564" y="167">r</text>
  <circle class="n" cx="690" cy="160" r="18"/><text class="t" x="684" y="167">x</text>
  <text class="s" x="515" y="230">once access(x) finishes, the root-to-x path is the</text>
  <text class="s" x="515" y="254">inorder sequence of one auxiliary splay tree</text>
</svg>
