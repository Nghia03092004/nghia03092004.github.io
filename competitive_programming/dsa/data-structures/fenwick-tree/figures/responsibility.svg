<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260" role="img" aria-labelledby="title desc">
  <title id="title">Fenwick tree bucket responsibility</title>
  <desc id="desc">A row of array indices with highlighted groups showing which ranges are summarized by selected Fenwick tree cells.</desc>
  <rect width="820" height="260" rx="28" fill="#fff8ef"/>
  <g font-family="IBM Plex Mono, monospace" fill="#3f352c">
    <text x="36" y="40" font-size="18">Each BIT cell stores the suffix of a prefix whose length is the least significant set bit.</text>
    <text x="36" y="66" font-size="16">Examples below: bit[4] covers [1,4], bit[6] covers [5,6], bit[8] covers [1,8].</text>
  </g>
  <g transform="translate(52 120)">
    <g font-family="IBM Plex Mono, monospace" font-size="16" text-anchor="middle">
      <g fill="#fffdf7" stroke="#3f352c" stroke-width="2">
        <rect x="0" y="0" width="72" height="52" rx="10"/>
        <rect x="72" y="0" width="72" height="52" rx="10"/>
        <rect x="144" y="0" width="72" height="52" rx="10"/>
        <rect x="216" y="0" width="72" height="52" rx="10"/>
        <rect x="288" y="0" width="72" height="52" rx="10"/>
        <rect x="360" y="0" width="72" height="52" rx="10"/>
        <rect x="432" y="0" width="72" height="52" rx="10"/>
        <rect x="504" y="0" width="72" height="52" rx="10"/>
      </g>
      <g fill="#161412">
        <text x="36" y="31">1</text>
        <text x="108" y="31">2</text>
        <text x="180" y="31">3</text>
        <text x="252" y="31">4</text>
        <text x="324" y="31">5</text>
        <text x="396" y="31">6</text>
        <text x="468" y="31">7</text>
        <text x="540" y="31">8</text>
      </g>
    </g>

    <g fill="none" stroke-linecap="round">
      <rect x="0" y="72" width="288" height="40" rx="18" fill="rgba(194,95,53,0.18)" stroke="#c25f35" stroke-width="3"/>
      <rect x="288" y="124" width="144" height="40" rx="18" fill="rgba(13,92,110,0.18)" stroke="#0d5c6e" stroke-width="3"/>
      <rect x="0" y="176" width="576" height="40" rx="18" fill="rgba(93,114,58,0.18)" stroke="#5d723a" stroke-width="3"/>
    </g>
    <g font-family="IBM Plex Mono, monospace" font-size="15" fill="#3f352c">
      <text x="598" y="99">bit[4] stores sum(1..4)</text>
      <text x="598" y="151">bit[6] stores sum(5..6)</text>
      <text x="598" y="203">bit[8] stores sum(1..8)</text>
    </g>
  </g>
</svg>
