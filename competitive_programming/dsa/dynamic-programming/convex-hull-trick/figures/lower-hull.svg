<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Lower hull for convex hull trick</title>
  <desc id="desc">Three lines on a coordinate plane. The highlighted orange line is best at the marked query x-value.</desc>
  <rect width="720" height="360" rx="28" fill="#fff8ef"/>
  <g stroke="#6d6155" stroke-width="2" fill="none">
    <path d="M88 300 H648"/>
    <path d="M120 320 V54"/>
  </g>
  <g font-family="IBM Plex Mono, monospace" font-size="14" fill="#4b4138">
    <text x="634" y="320">x</text>
    <text x="98" y="68">y</text>
    <text x="468" y="108">best line at x = q</text>
  </g>
  <g fill="none" stroke-linecap="round">
    <path d="M120 284 C220 246, 338 196, 620 76" stroke="#0d5c6e" stroke-width="5"/>
    <path d="M120 246 C248 218, 372 186, 620 124" stroke="#7b896f" stroke-width="5"/>
    <path d="M120 308 C254 262, 378 190, 620 56" stroke="#c25f35" stroke-width="7"/>
    <path d="M430 300 V78" stroke="#8b2d2d" stroke-width="4" stroke-dasharray="10 10"/>
  </g>
  <g fill="#8b2d2d">
    <circle cx="430" cy="150" r="7"/>
  </g>
  <g font-family="IBM Plex Mono, monospace" font-size="14" fill="#3f352c">
    <text x="466" y="154">query q</text>
    <text x="535" y="78">y = m1 x + b1</text>
    <text x="528" y="136">y = m2 x + b2</text>
    <text x="518" y="46">y = m3 x + b3</text>
  </g>
</svg>
