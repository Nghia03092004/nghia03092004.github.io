<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Heavy-light decomposition chains</title>
  <desc id="desc">A rooted tree with thick orange heavy edges and dashed teal light edges, showing how chains are formed.</desc>
  <rect width="720" height="360" rx="28" fill="#fff8ef"/>
  <g font-family="IBM Plex Mono, monospace" font-size="16" fill="#3f352c">
    <text x="36" y="42">Heavy edges stay inside one chain.</text>
    <text x="36" y="68">Crossing a light edge starts a new chain.</text>
  </g>
  <g stroke-linecap="round" fill="none">
    <path d="M360 86 L250 160" stroke="#0d5c6e" stroke-width="5" stroke-dasharray="10 10"/>
    <path d="M360 86 L360 160" stroke="#c25f35" stroke-width="10"/>
    <path d="M360 160 L360 242" stroke="#c25f35" stroke-width="10"/>
    <path d="M360 242 L360 316" stroke="#c25f35" stroke-width="10"/>
    <path d="M250 160 L180 238" stroke="#c25f35" stroke-width="10"/>
    <path d="M250 160 L292 238" stroke="#0d5c6e" stroke-width="5" stroke-dasharray="10 10"/>
    <path d="M360 160 L456 238" stroke="#0d5c6e" stroke-width="5" stroke-dasharray="10 10"/>
    <path d="M456 238 L520 314" stroke="#c25f35" stroke-width="10"/>
    <path d="M456 238 L416 314" stroke="#0d5c6e" stroke-width="5" stroke-dasharray="10 10"/>
  </g>
  <g stroke="#3f352c" stroke-width="2" fill="#fffdf7">
    <circle cx="360" cy="86" r="18"/>
    <circle cx="250" cy="160" r="18"/>
    <circle cx="360" cy="160" r="18"/>
    <circle cx="180" cy="238" r="18"/>
    <circle cx="292" cy="238" r="18"/>
    <circle cx="360" cy="242" r="18"/>
    <circle cx="456" cy="238" r="18"/>
    <circle cx="360" cy="316" r="18"/>
    <circle cx="416" cy="314" r="18"/>
    <circle cx="520" cy="314" r="18"/>
  </g>
  <g font-family="IBM Plex Mono, monospace" font-size="15" text-anchor="middle" fill="#161412">
    <text x="360" y="91">1</text>
    <text x="250" y="165">2</text>
    <text x="360" y="165">3</text>
    <text x="180" y="243">4</text>
    <text x="292" y="243">5</text>
    <text x="360" y="247">6</text>
    <text x="456" y="243">7</text>
    <text x="360" y="321">8</text>
    <text x="416" y="319">9</text>
    <text x="520" y="319">10</text>
  </g>
  <g font-family="IBM Plex Mono, monospace" font-size="14" fill="#3f352c">
    <text x="510" y="84">Heavy chain A</text>
    <text x="515" y="108">1 - 3 - 6 - 8</text>
    <text x="510" y="164">Heavy chain B</text>
    <text x="515" y="188">2 - 4</text>
    <text x="510" y="244">Heavy chain C</text>
    <text x="515" y="268">7 - 10</text>
  </g>
</svg>
